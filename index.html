<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>에스티니앙 킥 메이커</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 36px;
    }

    p {
      color: #ccc;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 17px;
    }

    .app {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .panel {
      background: #222;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .upload-area {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #2f2f2f;
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 100%;
      min-width: 0;
    }

    input[type="file"] {
      color: white;
      max-width: 260px;
    }

    .file-name {
      color: #ccc;
      font-size: 14px;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    button, select {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      background: #4f8cff;
      color: white;
    }

    button:hover {
      background: #6fa1ff;
    }

    select {
      background: white;
      color: #111;
      cursor: pointer;
    }

    .toggle-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2f2f2f;
      padding: 12px 16px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .toggle-box label {
      cursor: pointer;
      user-select: none;
      font-weight: bold;
    }

    .canvas-wrap {
      width: 100%;
      overflow-x: auto;
      border-radius: 12px;
    }

    canvas {
      width: 100%;
      max-width: 1365px;
      height: auto;
      border: 2px solid #444;
      border-radius: 12px;
      background: #333;
      display: block;
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 15px;
      }

      .panel {
        flex-direction: column;
        align-items: stretch;
      }

      .upload-area {
        flex-direction: column;
        align-items: stretch;
      }

      input[type="file"] {
        max-width: 100%;
      }

      .file-name {
        max-width: 100%;
      }

      button,
      select,
      .toggle-box {
        width: 100%;
      }

      .toggle-box {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>에스티니앙 킥 메이커</h1>
    <p>사진 1장을 업로드하고 배경을 고르면 자동으로 합성됩니다.</p>

    <div class="panel">
      <div class="upload-area">
        <input type="file" id="targetUpload" accept="image/*">
        <span id="fileName" class="file-name">선택된 사진 없음</span>
      </div>

      <select id="templateSelect">
        <option value="fold">다리접기샷</option>
        <option value="stretch">다리펴기샷</option>
      </select>

      <div class="toggle-box">
        <input type="checkbox" id="effectToggle" checked>
        <label for="effectToggle">슝 효과 켜기</label>
      </div>

      <button id="downloadBtn">PNG 저장</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="canvas" width="1365" height="768"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const targetUpload = document.getElementById("targetUpload");
    const fileName = document.getElementById("fileName");
    const templateSelect = document.getElementById("templateSelect");
    const effectToggle = document.getElementById("effectToggle");
    const downloadBtn = document.getElementById("downloadBtn");

    const templates = {
      fold: {
        name: "darijeopgi",
        file: "assets/estinien-kick-close.png",
        x: 850,
        y: 310,
        baseSize: 190,
        rotation: -16
      },
      stretch: {
        name: "daripyeogi",
        file: "assets/estinien-kick-wide.png",
        x: 1100,
        y: 255,
        baseSize: 220,
        rotation: -10
      }
    };

    let currentTemplateName = "fold";
    let bgImage = new Image();
    let targetImage = null;
    let effectEnabled = true;

    function loadBackground() {
      const template = templates[currentTemplateName];
      bgImage = new Image();
      bgImage.onload = () => {
        draw();
      };
      bgImage.src = template.file;
    }

    loadBackground();

    targetUpload.addEventListener("change", () => {
      const file = targetUpload.files[0];
      if (!file) return;

      fileName.textContent = file.name;

      const url = URL.createObjectURL(file);
      const img = new Image();

      img.onload = () => {
        targetImage = img;
        draw();
      };

      img.src = url;
    });

    templateSelect.addEventListener("change", () => {
      currentTemplateName = templateSelect.value;
      loadBackground();
    });

    sizeSelect.addEventListener("change", () => {
      draw();
    });

    effectToggle.addEventListener("change", () => {
      effectEnabled = effectToggle.checked;
      draw();
    });

    function drawMotionEffect(template, drawWidth, drawHeight) {
      const centerX = template.x;
      const centerY = template.y;

      ctx.save();
      ctx.globalAlpha = 0.55;
      ctx.filter = "blur(3px)";

      const lineStartX = centerX - 520;
      const lineEndX = centerX - 30;

      for (let i = 0; i < 18; i++) {
        const y = centerY - drawHeight * 0.45 + i * (drawHeight / 14);
        const thickness = i % 3 === 0 ? 10 : 5;

        const gradient = ctx.createLinearGradient(lineStartX, y, lineEndX, y);
        gradient.addColorStop(0, "rgba(255,255,255,0)");
        gradient.addColorStop(0.25, "rgba(255,255,255,0.25)");
        gradient.addColorStop(0.7, "rgba(30,30,30,0.45)");
        gradient.addColorStop(1, "rgba(30,30,30,0)");

        ctx.fillStyle = gradient;
        ctx.fillRect(lineStartX, y, lineEndX - lineStartX, thickness);
      }

      ctx.restore();

      const trailCount = 5;

      for (let i = trailCount; i >= 1; i--) {
        ctx.save();

        const offsetX = i * 32;
        const offsetY = i * 2;
        const alpha = 0.09 + i * 0.035;

        ctx.globalAlpha = alpha;
        ctx.filter = "brightness(0) blur(1px)";

        ctx.translate(template.x - offsetX, template.y + offsetY);
        ctx.rotate((template.rotation - i * 2) * Math.PI / 180);

        ctx.drawImage(
          targetImage,
          -drawWidth / 2,
          -drawHeight / 2,
          drawWidth,
          drawHeight
        );

        ctx.restore();
      }

      ctx.globalAlpha = 1;
      ctx.filter = "none";
    }

    function draw() {
      const template = templates[currentTemplateName];

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (bgImage.complete) {
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
      }

      if (targetImage) {
        const maxSide = Math.max(targetImage.width, targetImage.height);
        const sizeMultiplier = Number(sizeSelect.value);
        const finalSize = template.baseSize * sizeMultiplier;
        
        const drawWidth = (targetImage.width / maxSide) * finalSize;
        const drawHeight = (targetImage.height / maxSide) * finalSize;

        if (effectEnabled) {
          drawMotionEffect(template, drawWidth, drawHeight);
        }

        ctx.save();
        ctx.translate(template.x, template.y);
        ctx.rotate(template.rotation * Math.PI / 180);
        ctx.drawImage(
          targetImage,
          -drawWidth / 2,
          -drawHeight / 2,
          drawWidth,
          drawHeight
        );
        ctx.restore();
      }
    }

    downloadBtn.addEventListener("click", () => {
      const template = templates[currentTemplateName];

      const link = document.createElement("a");
      link.download = "estinien-kick-maker-" + template.name + ".png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  </script>
</body>
</html>
